<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />
    <title>Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body onclick="focusInput()">
    <div id="page">
      <span id="committed"></span
      ><span id="editor"
        ><span id="typing-before"></span><span id="caret"></span
        ><span id="typing-after"></span
      ></span>
    </div>

    <div id="status"></div>

    <button id="btn-desktop" onclick="confirmar()">
      <span style="margin-left: 4px">Guardar</span>
    </button>

    <button id="btn-mobile" onclick="confirmar()">Guardar</button>

    <textarea
      id="hidden-input"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    ></textarea>

    <script src="app.js"></script>
  </body>
</html>
