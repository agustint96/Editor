<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />
    <title>Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="page">
      <span id="committed" contenteditable="false"></span
      ><span id="editor" contenteditable="true" spellcheck="false"></span>
    </div>

    <div id="status"></div>

    <div id="btn-desktop-wrap">
      <span id="kbd-hint"
        ><span class="kbd">⇧</span><span class="kbd-sep">+</span
        ><span class="kbd">Enter</span></span
      >
      <span class="kbd-sep">+</span>
      <button id="btn-desktop" onclick="confirmar()">Guardar</button>
    </div>

    <button id="btn-mobile" onclick="confirmar()">Guardar</button>

    <script src="app.js"></script>
  </body>
</html>
