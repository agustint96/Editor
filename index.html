<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />
    <title>Editor</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body onclick="focusEditor(event)">
    <div id="page">
      <span id="committed" contenteditable="false"></span><span id="editor" contenteditable="true" spellcheck="false"></span>
    </div>

    <div id="status"></div>

    <button id="btn-desktop" onclick="confirmar()">
      <span style="margin-left: 4px">Guardar</span>
    </button>

    <button id="btn-mobile" onclick="confirmar()">Guardar</button>

    <script src="app.js"></script>
  </body>
</html>
